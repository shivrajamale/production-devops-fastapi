apiVersion: apps/v1
kind: Deployment
metadata:
  name: fastapi-app

spec:
  replicas: 2

  selector:
    matchLabels:
      app: fastapi-app

  template:
    metadata:
      labels:
        app: fastapi-app

    spec:
      containers:
      - name: fastapi-app
        image: shivrajamale/fastapi-app:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8000


        